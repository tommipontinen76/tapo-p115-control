name: Build and Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install PySide6-Essentials qasync plugp100 pyinstaller
      - name: Build EXE
        run: python build_exe.py
        env:
          CI_OUTPUT: ./output
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: |
            output/TapoP115Control.exe
            output/TapoP115Control-CLI.exe

  build-linux-amd64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg
      - name: Build DEB
        run: python3 build_deb.py
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb-amd64
          path: "*.deb"

  build-linux-arm64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Build DEB (ARM64 via QEMU)
        run: |
          docker run --rm --platform linux/arm64 \
            -v ${{ github.workspace }}:/work \
            -w /work \
            arm64v8/ubuntu:22.04 /bin/bash -c "
              apt-get update &&
              apt-get install -y python3 python3-pip dpkg &&
              python3 build_deb.py
            "
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb-arm64
          path: "*.deb"

  create-release:
    needs: [build-windows, build-linux-amd64, build-linux-arm64]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: artifacts/*
          generate_release_notes: true